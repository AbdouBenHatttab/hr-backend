spring.application.name=hr-backend
server.port=${SERVER_PORT:8081}

# Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/hr-realm}

# Keycloak Admin Configuration (for user registration)
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
keycloak.realm=${KEYCLOAK_REALM:hr-realm}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}

# Keycloak Client Configuration (for login)
keycloak.client-id=${KEYCLOAK_CLIENT_ID:hr-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/hr_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
# Set to true only in dev — never in production (leaks query data to stdout)
spring.jpa.show-sql=false

# Email Configuration (SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application Settings
app.company.name=ArabSoft HR-Nexus

# Kafka Configuration
app.kafka.enabled=${APP_KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:hr-backend-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Topics
app.kafka.topic.user-role-assigned=user-role-assigned
app.kafka.topic.password-reset=password-reset

# Base URL used for QR verification links in PDFs
# This should point to the FRONTEND so scanning shows a proper page, not raw JSON
app.base-url=http://localhost:5173
